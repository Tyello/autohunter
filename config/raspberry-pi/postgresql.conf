# postgresql.conf - profile recomendado para AutoHunter em Raspberry Pi 4 (4GB)
# Ajuste manual e versionado como referência operacional.

# Conexões
max_connections = 25

# Memória
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 8MB
maintenance_work_mem = 128MB

# Checkpoint/WAL (reduz picos de I/O em SD card)
checkpoint_completion_target = 0.9
wal_buffers = 32MB

# Durabilidade x previsibilidade
# IMPORTANTE: usar somente se for aceitável perder poucos segundos de logs/eventos
# em crash abrupto de energia/sistema.
synchronous_commit = off

# Logging (evitar overhead desnecessário)
logging_collector = off
log_statement = 'none'
log_duration = off

# Vacuum
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s
